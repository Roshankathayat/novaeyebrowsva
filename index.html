<!DOCTYPE html>
<html>
<head>
  <title>Nova Eyebrows</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      scroll-behavior: smooth;
    }

    /* LOADING SCREEN */
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-size: 24px;
      letter-spacing: 3px;
      color: #d4af37;
    }

    /* NAVBAR */
    nav {
      position: fixed;
      width: 100%;
      top: 0;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      text-align: center;
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    nav a {
      margin: 0 15px;
      color: #d4af37;
      text-decoration: none;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #111, #000);
      text-align: center;
    }

    .hero h1 {
      font-size: 50px;
      text-shadow: 0 0 20px #d4af37;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 30px;
      border: 2px solid #d4af37;
      color: #d4af37;
      text-decoration: none;
      border-radius: 30px;
    }

    .btn:hover {
      background: #d4af37;
      color: black;
      box-shadow: 0 0 20px #d4af37;
    }

    .section {
      padding: 80px 20px;
      text-align: center;
    }

    .gallery img {
      width: 300px;
      margin: 10px;
      border-radius: 10px;
    }

    /* PARTICLES */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }
  </style>
</head>

<body>

<div id="loader">NOVA EYEBROWS</div>

<canvas id="particles"></canvas>

<nav>
  <a href="#">Home</a>
  <a href="#services">Services</a>
  <a href="#gallery">Gallery</a>
  <a href="#contact">Contact</a>
</nav>

<div class="hero">
  <h1>NOVA EYEBROWS</h1>
  <a class="btn" href="https://squareup.com/appointments/book" target="_blank">Book Now</a>
</div>

<div id="services" class="section">
  <h2>Services</h2>
  <p>Threading — $15</p>
  <p>Tinting — $25</p>
  <p>Lamination — $60</p>
  <p>Microblading — $150</p>
</div>

<div id="gallery" class="section gallery">
  <h2>Before & After</h2>
  <!-- REPLACE THESE WITH YOUR REAL PHOTOS -->
  <img src="https://images.unsplash.com/photo-1580618672591-eb180b1a973f">
  <img src="https://images.unsplash.com/photo-1604654894610-df63bc536371">
</div>

<div id="contact" class="section">
  <h2>Follow Us</h2>
  <a class="btn" href="https://instagram.com/novaeyebrowsva" target="_blank">Instagram</a>
</div>

<script>
  // LOADER
  window.onload = () => {
    setTimeout(() => {
      document.getElementById("loader").style.display = "none";
    }, 1500);
  };

  // PARTICLES
  const canvas = document.getElementById("particles");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particles = [];

  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2,
      dx: Math.random() - 0.5,
      dy: Math.random() - 0.5
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#d4af37";

    particles.forEach(p => {
      p.x += p.dx;
      p.y += p.dy;

      if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });

    requestAnimationFrame(animate);
  }

  animate();
</script>

</body>
</html>
