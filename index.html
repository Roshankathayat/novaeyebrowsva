<!DOCTYPE html>
<html>
<head>
  <title>Nova Eyebrows</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 28px;
      letter-spacing: 3px;
      color: #d4af37;
    }

    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
      text-align: center;
    }

    .hero h1 {
      font-size: 45px;
      margin: 0;
      text-shadow: 0 0 20px #d4af37;
    }

    .hero p {
      margin-top: 10px;
      color: #aaa;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 30px;
      border: 2px solid #d4af37;
      color: #d4af37;
      text-decoration: none;
      border-radius: 30px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #d4af37;
      color: black;
      box-shadow: 0 0 20px #d4af37;
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .prices {
      background: #111;
    }

    .price-item {
      margin: 10px 0;
      font-size: 18px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .gallery img {
      width: 100%;
      border-radius: 12px;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #d4af37;
    }

    footer {
      background: #000;
      padding: 20px;
      text-align: center;
      color: #888;
    }
  </style>
</head>

<body>

<header>NOVA EYEBROWS</header>

<div class="hero">
  <h1>Futuristic Beauty</h1>
  <p>Precision • Confidence • Luxury</p>
  <a class="btn" href="https://squareup.com/appointments/book" target="_blank">Book Now</a>
</div>

<div class="section prices">
  <h2>Services & Pricing</h2>
  <div class="price-item">Eyebrow Threading — $15</div>
  <div class="price-item">Eyebrow Tinting — $25</div>
  <div class="price-item">Brow Lamination — $60</div>
  <div class="price-item">Microblading — $150</div>
</div>

<div class="section">
  <h2>Before & After</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1580618672591-eb180b1a973f">
    <img src="https://images.unsplash.com/photo-1604654894610-df63bc536371">
    <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348">
  </div>
</div>

<div class="section">
  <h2>Follow Us</h2>
  <a class="btn" href="https://instagram.com/novaeyebrowsva" target="_blank">Instagram</a>
</div>

<footer>
  © 2026 Nova Eyebrows • Falls Church, VA
</footer>

</body>
</html>
