<!DOCTYPE html>
<html>
<head>
  <title>Nova Eyebrows</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #333;
    }

    header {
      background: #000;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      letter-spacing: 2px;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1600185365483-26d7c6d3b8b9') center/cover;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .hero h1 {
      font-size: 40px;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 25px;
      background: #d4af37;
      color: black;
      text-decoration: none;
      font-weight: bold;
      border-radius: 5px;
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .prices {
      background: #f9f9f9;
    }

    .price-item {
      margin: 10px 0;
      font-size: 18px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      background: #000;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  NOVA EYEBROWS
</header>

<div class="hero">
  <div>
    <h1>Enhance Your Natural Beauty</h1>
    <a class="btn" href="https://squareup.com/appointments/book">Book Appointment</a>
  </div>
</div>

<div class="section prices">
  <h2>Our Services & Prices</h2>
  <div class="price-item">Eyebrow Threading — $15</div>
  <div class="price-item">Eyebrow Tinting — $25</div>
  <div class="price-item">Brow Lamination — $60</div>
  <div class="price-item">Microblading — $150</div>
</div>

<div class="section">
  <h2>Before & After</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1580618672591-eb180b1a973f">
    <img src="https://images.unsplash.com/photo-1604654894610-df63bc536371">
    <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348">
  </div>
</div>

<div class="section">
  <h2>Follow Us</h2>
  <a class="btn" href="https://instagram.com/novaeyebrowsva" target="_blank">Instagram</a>
</div>

<footer>
  © 2026 Nova Eyebrows | Falls Church, VA
</footer>

</body>
</html>
